name: .NET Build & Package

on:
  push:
    branches: [ "master" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    strategy:
      matrix:
        configuration: [Release]
        platform: [x64, x86]

    runs-on: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 9.0.x

    - name: Restore dependencies
      run: dotnet restore
      working-directory: TestCOMServer

    - name: Build
      run: dotnet build --no-restore --configuration ${{ matrix.configuration }}
      working-directory: TestCOMServer

    - name: Publish
      run: dotnet publish --configuration ${{ matrix.configuration }} --runtime win-${{ matrix.platform }} --self-contained false --output publish/${{ matrix.platform }}
      working-directory: TestCOMServer/TestCOMServer

    - name: Create stub executable
      shell: pwsh
      run: |
        # Minimal C# console app as MSIX entry point stub
        $stubDir = "stub-src"
        New-Item -ItemType Directory -Force -Path $stubDir
        Set-Content "$stubDir/stub.cs" "class Stub { static void Main() { } }"
        Set-Content "$stubDir/stub.csproj" @"
        <Project Sdk="Microsoft.NET.Sdk">
          <PropertyGroup>
            <OutputType>Exe</OutputType>
            <TargetFramework>net9.0-windows</TargetFramework>
            <AssemblyName>stub</AssemblyName>
          </PropertyGroup>
        </Project>
        "@
        dotnet publish "$stubDir/stub.csproj" -c Release -r win-${{ matrix.platform }} --self-contained false -o stub-out

    - name: Prepare MSIX layout
      shell: pwsh
      run: |
        $layout = "msix-layout/${{ matrix.platform }}"
        New-Item -ItemType Directory -Force -Path $layout
        Copy-Item "TestCOMServer/TestCOMServer/publish/${{ matrix.platform }}/*" -Destination $layout -Recurse
        Copy-Item "stub-out/stub.exe" -Destination $layout
        Copy-Item "TestCOMServer/TestCOMServer.Package/AppxManifest.xml" -Destination $layout
        Copy-Item "TestCOMServer/TestCOMServer.Package/Assets" -Destination "$layout/Assets" -Recurse

        # Patch architecture in manifest
        $manifest = Get-Content "$layout/AppxManifest.xml" -Raw
        $manifest = $manifest -replace 'ProcessorArchitecture="x64"', 'ProcessorArchitecture="${{ matrix.platform }}"'
        Set-Content "$layout/AppxManifest.xml" $manifest

    - name: Create MSIX package
      shell: pwsh
      run: |
        $sdkPath = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin\10.*\x64\makeappx.exe" | Sort-Object | Select-Object -Last 1
        & $sdkPath.FullName pack /d "msix-layout/${{ matrix.platform }}" /p "TestCOMServer-${{ matrix.platform }}.msix" /nv
        Write-Host "Created TestCOMServer-${{ matrix.platform }}.msix"

    - name: Create ZIP artifact
      shell: pwsh
      run: |
        Compress-Archive -Path "TestCOMServer/TestCOMServer/publish/${{ matrix.platform }}/*" -DestinationPath "TestCOMServer-${{ matrix.platform }}.zip"

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: TestCOMServer-${{ matrix.platform }}
        path: |
          TestCOMServer-${{ matrix.platform }}.msix
          TestCOMServer-${{ matrix.platform }}.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Determine version tag
      id: version
      shell: bash
      run: |
        # Use the tag if this was a tag push, otherwise derive from csproj
        if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
          TAG="${GITHUB_REF#refs/tags/}"
        else
          VERSION=$(grep -oP '(?<=<Version>)[^<]+' TestCOMServer/TestCOMServer/TestCOMServer.csproj)
          TAG="v${VERSION}"
        fi
        echo "tag=$TAG" >> "$GITHUB_OUTPUT"

        # Check if tag already exists on remote
        if git ls-remote --tags origin "refs/tags/$TAG" | grep -q "$TAG"; then
          echo "exists=true" >> "$GITHUB_OUTPUT"
        else
          echo "exists=false" >> "$GITHUB_OUTPUT"
        fi

    - name: Create tag if missing
      if: steps.version.outputs.exists == 'false'
      run: |
        git tag ${{ steps.version.outputs.tag }}
        git push origin ${{ steps.version.outputs.tag }}

    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts

    - name: Create or update GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.version.outputs.tag }}
        draft: false
        generate_release_notes: true
        files: |
          artifacts/**/*.msix
          artifacts/**/*.zip
